<!DOCTYPE html>
<html>
<head>
<title> Task 8 </title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>
<body>

<h2>Traversing Methods</h2>

<div id="parent" style="border:1px solid pink;padding:10px;">

  <p>First</p>
  <p id="mid">Middle</p>
  <p>Last</p>

</div>

<br>

<button id="parentBtn">Highlight Parent</button>
<button id="childrenBtn">Children</button>
<button id="siblingsBtn">Siblings</button>
<button id="nextBtn">Next</button>
<button id="prevBtn">Prev</button>

<script>

$(document).ready(function(){

  $("#parentBtn").click(function(){
    $("#mid").parent().css("background","pink");
  });

  $("#childrenBtn").click(function(){
    $("#parent").children().css("color","red");
  });

  $("#siblingsBtn").click(function(){
    $("#mid").siblings().css("background","lightgreen");
  });

  $("#nextBtn").click(function(){
    $("#mid").next().css("font-weight","bold");
  });

  $("#prevBtn").click(function(){
    $("#mid").prev().css("text-decoration","underline");
  });

});

</script>
</body>
</html>
